# Select with `data=sudoku-gen` on the CLI.
# Layout per example: [ puzzle(81) | solution(81) ] -> length 162
# (matches model.small length). No BOS / row-separator tokens.
is_iterable: False
train: sudoku
valid: sudoku
tokenizer_name_or_path: sudoku
infill_loss_region: fill #board/fill.  fill is blanks only, board is full  
cache_dir: ./cache
wrap: False
streaming: False
insert_train_eos: False
insert_valid_eos: False

data_paths: []
data_paths_test: []

eval_interval: 10_000

#subset 
train_subset_n: null 
subset_seed: 0

# Generation parameters (consumed by dataloader.get_sudoku_dataset).
num_train: 48000
num_valid: 2000
difficulty: hard   # easy / medium / hard
gen_num_workers: 16
gen_output_dir: data/sudoku-gen